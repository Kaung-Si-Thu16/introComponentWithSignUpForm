<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="./images/favicon-32x32.png" type="image/x-icon">
    <link rel="stylesheet" href="https://fonts.google.com/specimen/Poppins">
    <title>Sign Up</title>
</head>

<body>
    <div class="container">
        <div class="leftSide">
            <h1>Learn to code by <br> watching others</h1>

            <p>See how experienced developers solve problems in real-time. <br> watching scripted tutorials is great, but understanding how <br> developers think is invaluble.</p>
        </div>

        <div class="rightSide">
            <div class="trial">
                <p class="d-inline first-child">Try it free 7 days</p>
                <p class="d-inline last-child">then $20/mo. thereafter</p>
            </div>

            <div class="form-card">
                <form style="padding-top: 3%;">
                    <input type="text" name="firstName" id="firstName" placeholder="First Name" autocomplete="off">

                    <input type="text" name="lastName" id="lastName" placeholder="Last Name" autocomplete="off">

                    <input type="email" name="email" id="email" placeholder="Email Address" autocomplete="off">

                    <input type="password" name="password" id="password" placeholder="Password" autocomplete="off">

                    <button class="submitBtn">CLAIM YOUR FREE TRIAL</button>
                </form>

                <p class="footer-text">
                    By clicking the button you are agreeing to our
                </p>
                <p class="terms">
                    Terms and Services
                </p>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
    <script src="./js/bootstrap.bundle.min.js"></script>
</body>

</html>
